services:
  web:
    build: .
    dns:
      - 10.10.1.41
      - 10.10.1.54
    extra_hosts:
      - "DSMTZDC04.grupocomolatti.corp:10.10.1.41"
      - "DSMTZDC04:10.10.1.41"
    ports:
      - "5000:5000"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static/uploads:/app/static/uploads
    restart: unless-stopped
    container_name: ad_manager_web

  scheduler:
    build: .
    dns:
      - 10.10.1.41
      - 10.10.1.54
    extra_hosts:
      - "DSMTZDC04.grupocomolatti.corp:10.10.1.41"
      - "DSMTZDC04:10.10.1.41"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    # O comando agora apenas inicia o cron em primeiro plano. A configuração é feita no Dockerfile.
    command: sh -c "printenv > /etc/environment && cron -f"
    restart: unless-stopped
    container_name: ad_manager_scheduler
